sonar.projectKey=thanhdatttt_DevOps-Project
sonar.organization=thanhdatttt

# Source encoding
sonar.sourceEncoding=UTF-8

# Project base directory (tells SonarCloud that all paths are relative to here)
sonar.projectBaseDir=.

# Source files — exclude tests, build artefacts, and generated files
sonar.sources=.
sonar.exclusions=\
  **/__tests__/**,\
  **/node_modules/**,\
  **/.next/**,\
  **/coverage/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/pages/_app.tsx,\
  **/pages/_document.tsx

# Test files — SonarCloud will NOT require coverage for these
sonar.tests=.
sonar.test.inclusions=\
  **/__tests__/**/*.test.ts,\
  **/__tests__/**/*.test.tsx,\
  **/__tests__/**/*.spec.ts,\
  **/__tests__/**/*.spec.tsx

# Coverage — lcov path is relative to sonar.projectBaseDir (i.e. backoffice/)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Exclude test files and non-meaningful files from coverage metrics entirely
sonar.coverage.exclusions=\
  **/__tests__/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/node_modules/**,\
  **/.next/**,\
  **/coverage/**,\
  **/pages/**,\
  **/styles/**,\
  **/public/**,\
  **/asset/**