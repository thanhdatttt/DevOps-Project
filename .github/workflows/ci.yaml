name: CI - Build and Push Images

on:
  push:
    branches:
      - '**' # all branches

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          [
            backoffice-bff,
            cart,
            customer,
            inventory,
            location,
            media,
            order,
            product,
            payment,
            payment-paypal,
            promotion,
            rating,
            recommendation,
            sampledata,
            search,
            storefront-bff,
            tax,
            webhook,
          ]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Check for changes in service directory
      - name: Check for changes
        id: check
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "New branch or first push — forcing build."
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
              | grep "^${{ matrix.service }}/" || true)
            if [ -n "$CHANGED" ]; then
              echo "Changes detected in ${{ matrix.service }}"
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "No changes in ${{ matrix.service }} — skipping."
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          fi

      # Build image tags:
      - name: Set image tags
        id: meta
        if: steps.check.outputs.changed == 'true'
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}"
          TAGS="${IMAGE}:${{ github.sha }}"
          if [ "${{ github.ref_name }}" = "main" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "Built tags: $TAGS"

      - name: Login to Docker Hub
        if: steps.check.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        if: steps.check.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Summary
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "Pushed image(s):"
          echo "   ${{ steps.meta.outputs.tags }}"