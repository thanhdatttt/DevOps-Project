name: CD - developer_build

on:
  workflow_dispatch:
    inputs:
      # empty or "main"  →  deploy image tag: latest
      # named branch     →  deploy image tag: commit SHA of that branch
      backoffice_bff_branch:
        description: 'backoffice-bff branch'
        required: false
        default: 'main'
      backoffice_branch:
        description: 'backoffice branch'
        required: false
        default: 'main'
      cart_branch:
        description: 'cart branch'
        required: false
        default: 'main'
      customer_branch:
        description: 'customer branch'
        required: false
        default: 'main'
      inventory_branch:
        description: 'inventory branch'
        required: false
        default: 'main'
      location_branch:
        description: 'location branch'
        required: false
        default: 'main'
      media_branch:
        description: 'media branch'
        required: false
        default: 'main'
      order_branch:
        description: 'order branch'
        required: false
        default: 'main'
      payment_branch:
        description: 'payment branch'
        required: false
        default: 'main'
      payment_paypal_branch:
        description: 'payment-paypal branch'
        required: false
        default: 'main'
      product_branch:
        description: 'product branch'
        required: false
        default: 'main'
      promotion_branch:
        description: 'promotion branch'
        required: false
        default: 'main'
      rating_branch:
        description: 'rating branch'
        required: false
        default: 'main'
      recommendation_branch:
        description: 'recommendation branch'
        required: false
        default: 'main'
      sampledata_branch:
        description: 'sampledata branch'
        required: false
        default: 'main'
      search_branch:
        description: 'search branch'
        required: false
        default: 'main'
      storefront_bff_branch:
        description: 'storefront-bff branch'
        required: false
        default: 'main'
      storefront_branch:
        description: 'storefront branch'
        required: false
        default: 'main'
      tax_branch:
        description: 'tax branch'
        required: false
        default: 'main'
      webhook_branch:
        description: 'webhook branch'
        required: false
        default: 'main'

env:
  DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      # KUBE_CONFIG secret
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create developer namespace
        run: |
          kubectl create namespace developer --dry-run=client -o yaml | kubectl apply -f -
          echo "Namespace 'developer' ready."

      - name: Resolve tags and deploy all services
        run: |
          # map: service-name → input branch
          declare -A BRANCHES=(
            ["backoffice-bff"]="${{ github.event.inputs.backoffice_bff_branch }}"
            ["backoffice"]="${{ github.event.inputs.backoffice_branch }}"
            ["cart"]="${{ github.event.inputs.cart_branch }}"
            ["customer"]="${{ github.event.inputs.customer_branch }}"
            ["inventory"]="${{ github.event.inputs.inventory_branch }}"
            ["location"]="${{ github.event.inputs.location_branch }}"
            ["media"]="${{ github.event.inputs.media_branch }}"
            ["order"]="${{ github.event.inputs.order_branch }}"
            ["payment"]="${{ github.event.inputs.payment_branch }}"
            ["payment-paypal"]="${{ github.event.inputs.payment_paypal_branch }}"
            ["product"]="${{ github.event.inputs.product_branch }}"
            ["promotion"]="${{ github.event.inputs.promotion_branch }}"
            ["rating"]="${{ github.event.inputs.rating_branch }}"
            ["recommendation"]="${{ github.event.inputs.recommendation_branch }}"
            ["sampledata"]="${{ github.event.inputs.sampledata_branch }}"
            ["search"]="${{ github.event.inputs.search_branch }}"
            ["storefront-bff"]="${{ github.event.inputs.storefront_bff_branch }}"
            ["storefront"]="${{ github.event.inputs.storefront_branch }}"
            ["tax"]="${{ github.event.inputs.tax_branch }}"
            ["webhook"]="${{ github.event.inputs.webhook_branch }}"
          )

          # map: service-name → NodePort
          declare -A PORTS=(
            ["backoffice-bff"]="30001"
            ["backoffice"]="30002"
            ["cart"]="30003"
            ["customer"]="30004"
            ["inventory"]="30005"
            ["location"]="30006"
            ["media"]="30007"
            ["order"]="30008"
            ["payment"]="30009"
            ["payment-paypal"]="30010"
            ["product"]="30011"
            ["promotion"]="30012"
            ["rating"]="30013"
            ["recommendation"]="30014"
            ["sampledata"]="30015"
            ["search"]="30016"
            ["storefront-bff"]="30017"
            ["storefront"]="30018"
            ["tax"]="30019"
            ["webhook"]="30020"
          )

          for SERVICE in "${!BRANCHES[@]}"; do
            BRANCH="${BRANCHES[$SERVICE]}"
            PORT="${PORTS[$SERVICE]}"

            # ── Resolve image tag ──────────────────────────────────────
            if [ -z "$BRANCH" ] || [ "$BRANCH" = "main" ]; then
              TAG="latest"
            else
              TAG=$(git rev-parse origin/$BRANCH 2>/dev/null || echo "")
              if [ -z "$TAG" ]; then
                echo "Branch '$BRANCH' not found for $SERVICE → fallback to latest"
                TAG="latest"
              fi
            fi

            echo "$SERVICE | branch: $BRANCH | tag: $TAG | nodePort: $PORT"

            # apply Deployment + NodePort Service
            kubectl apply -f - <<MANIFEST
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${SERVICE}
            namespace: developer
            labels:
              app: ${SERVICE}
              managed-by: developer-build
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: ${SERVICE}
            template:
              metadata:
                labels:
                  app: ${SERVICE}
              spec:
                containers:
                  - name: ${SERVICE}
                    image: ${{ env.DOCKER_USER }}/${SERVICE}:${TAG}
                    imagePullPolicy: Always
                    ports:
                      - containerPort: 8080
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${SERVICE}
            namespace: developer
          spec:
            type: NodePort
            selector:
              app: ${SERVICE}
            ports:
              - port: 8080
                targetPort: 8080
                nodePort: ${PORT}
          MANIFEST
          done

      - name: Wait for rollouts
        run: |
          SERVICES=(
            backoffice-bff backoffice cart customer inventory
            location media order payment payment-paypal product
            promotion rating recommendation sampledata search
            storefront-bff storefront tax webhook
          )
          for SERVICE in "${SERVICES[@]}"; do
            echo "Waiting for $SERVICE ..."
            kubectl rollout status deployment/$SERVICE -n developer --timeout=120s \
              || echo "$SERVICE timeout — check: kubectl logs -n developer deploy/$SERVICE"
          done

      - name: Print developer access info
        run: |
          WORKER_IP=$(kubectl get nodes -o wide \
            | grep -v NAME | grep -v control-plane | grep -v master \
            | awk '{print $6}' | head -1)
          # Single node cluster: use the node IP directly
          if [ -z "$WORKER_IP" ] || [ "$WORKER_IP" = "<none>" ]; then
            WORKER_IP=$(kubectl get nodes -o wide | grep -v NAME | awk '{print $6}' | head -1)
          fi

          echo ""
          echo "  DEPLOYMENT COMPLETE — Developer Access Info"
          echo ""
          echo "  Add to /etc/hosts on your device:"
          echo "      $WORKER_IP  yas.dev"
          echo ""
          echo "  Service URLs:"
          echo "      http://yas.dev:30001  →  backoffice-bff"
          echo "      http://yas.dev:30002  →  backoffice (Next.js)"
          echo "      http://yas.dev:30003  →  cart"
          echo "      http://yas.dev:30004  →  customer"
          echo "      http://yas.dev:30005  →  inventory"
          echo "      http://yas.dev:30006  →  location"
          echo "      http://yas.dev:30007  →  media"
          echo "      http://yas.dev:30008  →  order"
          echo "      http://yas.dev:30009  →  payment"
          echo "      http://yas.dev:30010  →  payment-paypal"
          echo "      http://yas.dev:30011  →  product"
          echo "      http://yas.dev:30012  →  promotion"
          echo "      http://yas.dev:30013  →  rating"
          echo "      http://yas.dev:30014  →  recommendation"
          echo "      http://yas.dev:30015  →  sampledata"
          echo "      http://yas.dev:30016  →  search"
          echo "      http://yas.dev:30017  →  storefront-bff"
          echo "      http://yas.dev:30018  →  storefront (Next.js)"
          echo "      http://yas.dev:30019  →  tax"
          echo "      http://yas.dev:30020  →  webhook"
          echo ""
          echo "  Worker node IP: $WORKER_IP"