name: media service ci

on:
  push:
    branches: [ "main" ]
    paths:
      - 'media/**'
      - 'common-library/**'
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/media-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: [ "main" ]
    paths:
      - 'media/**'
      - 'common-library/**'
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/media-ci.yaml"
      - "pom.xml"

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Test
  test:
    needs: gitleaks # Chạy sau khi gitleaks pass
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Cần thiết cho SonarQube phân tích chính xác

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21' # Tùy chỉnh theo version của project
          distribution: 'temurin'
          cache: maven

      # test
      - name: Run Tests & Check Coverage
        run: mvn clean test jacoco:report jacoco:check -pl media -am

      # 5: Upload Test Result
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always() # Upload ngay cả khi test fail
        with:
          name: media-test-results
          path: media/target/surefire-reports/

      # 5: Upload Coverage Report
      - name: Upload JaCoCo Coverage
        uses: actions/upload-artifact@v4
        with:
          name: media-coverage
          path: media/target/site/jacoco/

      # sonar
      - name: SonarCloud Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn sonar:sonar
          -pl media -am
          -Dsonar.projectKey=thanhdatttt_DevOps-Project
          -Dsonar.organization=thanhdatttt
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.coverage.jacoco.xmlReportPaths=media/target/site/jacoco/jacoco.xml

      # Fix Maven wrapper permission
      - name: Fix mvnw permissions
        run: |
          chmod +x media/mvnw

      # Install Snyk CLI
      - name: Install Snyk
        run: npm install -g snyk

      # Authenticate Snyk
      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      # Run Snyk scan
      - name: Snyk security scan
        run: |
          snyk test \
            --file=media/pom.xml \
            --severity-threshold=high \
            --sarif-file-output=snyk.sarif \
        continue-on-error: true

      # Upload result to GitHub Security tab
      - name: Upload Snyk SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif

  # 5: Phase Build
  build:
    needs: test # Chỉ build khi test pass
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./media
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build Application (Skip Test)
        run: mvn clean package -DskipTests -pl media -am